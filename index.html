<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Quant Console · Modern Light</title>
  <script src="https://unpkg.com/lightweight-charts@4.2.1/dist/lightweight-charts.standalone.production.js"></script>
  <style>/* Fix: ensure background covers full desktop viewport */
html, body {
  width: 100%;
  height: 100%;
}

body {
  min-height: 100vh;
}


    :root{
      --bg:#f6f8fc;
      --card:#ffffff;
      --line:#e6ebf3;
      --text:#0f172a;
      --muted:#64748b;
      --primary:#2563eb;
      --primary2:#4f46e5;
      --ok:#089981;
      --down:#f23645;
      --shadow:0 10px 30px rgba(15,23,42,.08);
    }
    *{box-sizing:border-box}
    body{margin:0;background:linear-gradient(180deg,#f8fafc 0%,#eef3fb 100%);color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,"PingFang SC","Microsoft YaHei",sans-serif}

    .bg-blob{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
    .blob{position:absolute;border-radius:50%;filter:blur(40px);opacity:.22;animation:float 14s ease-in-out infinite}
    .blob.b1{width:300px;height:300px;background:#60a5fa;left:-80px;top:-80px}
    .blob.b2{width:320px;height:320px;background:#a78bfa;right:-100px;top:20% ;animation-delay:2s}
    .blob.b3{width:260px;height:260px;background:#22d3ee;left:30%;bottom:-120px;animation-delay:4s}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}

    .wrap{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:22px}
    .top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:14px}
    .title{font-size:28px;font-weight:800;letter-spacing:.2px;animation:fadeInUp .55s ease both}
    .sub{color:var(--muted);font-size:14px;margin-top:4px;animation:fadeInUp .65s ease both}
    .badge{font-size:12px;padding:6px 10px;border-radius:999px;background:#eef2ff;color:#3730a3;border:1px solid #dbe4ff;animation:fadeInUp .75s ease both}
    @keyframes fadeInUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

    .tabs{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
    .tab{border:1px solid var(--line);background:#fff;color:#1e293b;padding:10px 14px;border-radius:10px;cursor:pointer;font-weight:700;transition:.2s}
    .tab:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
    .tab.active{background:linear-gradient(90deg,var(--primary),var(--primary2));color:#fff;border-color:transparent}

    .panel{border:1px solid var(--line);background:var(--card);border-radius:16px;padding:16px;box-shadow:var(--shadow);animation:fadeInUp .45s ease both}
    .hidden{display:none}

    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    .field{background:#fbfdff;border:1px solid var(--line);border-radius:12px;padding:12px;transition:.2s}
    .field:hover{border-color:#d6e0f0}
    label{display:flex;justify-content:space-between;gap:8px;font-size:13px;color:#334155;margin-bottom:8px}
    .hint{font-size:12px;color:#94a3b8}
    input{width:100%;padding:10px 12px;border-radius:9px;border:1px solid #d9e2ef;background:#fff;color:var(--text);font-size:15px;transition:.2s}
    input:focus{outline:none;border-color:#60a5fa;box-shadow:0 0 0 3px rgba(96,165,250,.2)}

    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    button{border:0;border-radius:10px;padding:10px 13px;font-weight:700;cursor:pointer;transition:.2s}
    button:hover{transform:translateY(-1px)}
    .b1{background:linear-gradient(90deg,var(--primary),var(--primary2));color:#fff}
    .b2{background:#f8fafc;border:1px solid #d8e1ef;color:#334155}

    .out{margin-top:12px;border:1px solid var(--line);border-radius:12px;background:#fcfdff;padding:12px;line-height:1.65}
    .ok{color:var(--ok);font-weight:700}
    .warn{color:var(--down);font-weight:700}
    .formula{margin-top:8px;color:#64748b;font-size:13px;border-top:1px dashed #d7e2f0;padding-top:8px}

    .toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
    .toolbar input{max-width:240px}
    .settlement{font-size:14px;color:#334155;background:#f8fbff;border:1px solid #dbe5f3;border-radius:10px;padding:8px 10px}
    .cards{display:flex;flex-direction:column;gap:12px}
    .row{background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px;box-shadow:0 4px 18px rgba(15,23,42,.05);animation:fadeInUp .35s ease both}
    .row-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    .symbol{font-weight:800;color:#1d4ed8}
    .charts{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .chartbox{background:#f9fbff;border:1px solid #e2e9f5;border-radius:10px;padding:8px;transition:.2s}
    .chartbox:hover{box-shadow:0 6px 20px rgba(37,99,235,.08)}
    .chartlabel{font-size:12px;color:#64748b;margin-bottom:6px}
    .chart{height:220px}

    @media (max-width:860px){.grid,.charts{grid-template-columns:1fr}.chart{height:200px}}
  </style>
</head>
<body>
  <div class="bg-blob"><div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div></div>
  <div class="wrap">
    <div class="top">
      <div>
        <div class="title">Quant Console</div>
        <div class="sub">白色现代风 · 融合「杠杆收益计算器」+「CRT Sniper 行情面板」</div>
      </div>
      <div class="badge">Modern Light v4</div>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="calc">杠杆收益计算</button>
      <button class="tab" data-tab="sniper">CRT Sniper 面板</button>
    </div>

    <section id="calc" class="panel">
      <div class="grid">
        <div class="field"><label>杠杆倍数 (×) <span class="hint">建议 2~5 起步</span></label><input id="leverage" type="number" min="1" step="0.01" value="10"></div>
        <div class="field"><label>手续费率 (%) <span class="hint">默认单边</span></label><input id="feePct" type="number" min="0" step="0.0001" value="0.07"></div>
        <div class="field"><label>目标净收益 (%)</label><input id="targetProfit" type="number" step="0.0001" value="10"></div>
        <div class="field"><label>标的实际变动 (%)</label><input id="underlyingMove" type="number" step="0.0001" placeholder="0.4"></div>
      </div>
      <div class="actions"><button class="b1" id="calcRequired">算：达到目标需变动</button><button class="b1" id="calcProfit">算：给定变动的收益</button><button class="b2" id="clearAll">清空</button></div>
      <div class="out"><div id="outText">结果会显示在这里。</div><div class="formula">毛收益率 = 杠杆 × 标的变动；净收益率 = 毛收益率 − (手续费率 × 杠杆)。</div></div>
    </section>

    <section id="sniper" class="panel hidden">
      <div class="toolbar"><div id="settlement" class="settlement">4H (--:--:--) | 1D (--:--:--)</div><input id="symbolInput" placeholder="输入币种，例如 XRPUSDT"><button class="b1" id="addBtn">+ 添加币种</button></div>
      <div id="cards" class="cards"></div>
    </section>
  </div>

<script>
  const tabs=document.querySelectorAll('.tab');
  let sniperInitialized=false;
  function initSniperOnce(){ if(sniperInitialized) return; sniperInitialized=true; defaultSymbols.forEach(addSymbolRow); }
  tabs.forEach(btn=>btn.onclick=()=>{ tabs.forEach(b=>b.classList.remove('active')); btn.classList.add('active'); const toSniper=btn.dataset.tab==='sniper'; document.getElementById('calc').classList.toggle('hidden',toSniper); document.getElementById('sniper').classList.toggle('hidden',!toSniper); if(toSniper) initSniperOnce(); });

  const outText=document.getElementById('outText');
  const val=id=>{const n=parseFloat(document.getElementById(id).value); return Number.isFinite(n)?n:NaN};
  const pct=n=>Number.isFinite(n)?`${parseFloat(n.toFixed(6))}%`:'—';

  document.getElementById('calcRequired').onclick=()=>{
    const L=val('leverage'),target=val('targetProfit'),fee=val('feePct');
    if(!(L>0)||!Number.isFinite(target)||fee<0){outText.textContent='请正确填写参数。';return;}
    const noFee=target/L, feeCost=fee*L, withFee=(target+feeCost)/L;
    document.getElementById('underlyingMove').value=Number(withFee.toFixed(6));
    outText.innerHTML=`不计手续费：<span class="ok">${pct(noFee)}</span><br>计手续费：<span class="warn">${pct(withFee)}</span><br>手续费折算损耗：<span class="warn">${pct(feeCost)}</span>`;
  };
  document.getElementById('calcProfit').onclick=()=>{
    const L=val('leverage'),move=val('underlyingMove'),fee=val('feePct');
    if(!(L>0)||!Number.isFinite(move)||fee<0){outText.textContent='请正确填写参数。';return;}
    const gross=L*move, feeCost=fee*L, net=gross-feeCost;
    outText.innerHTML=`毛收益：<span class="ok">${pct(gross)}</span><br>净收益：<span class="warn">${pct(net)}</span><br>手续费折算损耗：<span class="warn">${pct(feeCost)}</span>`;
  };
  document.getElementById('clearAll').onclick=()=>{['leverage','feePct','targetProfit','underlyingMove'].forEach(id=>document.getElementById(id).value=''); outText.textContent='已清空输入。';};

  const wsURL='wss://stream.bybit.com/v5/public/linear';
  const cards=document.getElementById('cards');
  const settlementEl=document.getElementById('settlement');
  const defaultSymbols=['BTCUSDT','ETHUSDT','SOLUSDT','XRPUSDT'];

  function createChart(element){
    const rect=element.getBoundingClientRect();
    const chart=LightweightCharts.createChart(element,{width:rect.width,height:rect.height,layout:{background:{color:'#f9fbff'},textColor:'#334155'},grid:{vertLines:{color:'#edf2f9'},horzLines:{color:'#edf2f9'}},rightPriceScale:{borderColor:'#dbe5f3'},timeScale:{borderColor:'#dbe5f3',visible:false}});
    const series=chart.addCandlestickSeries({upColor:'#006064',downColor:'rgba(46,46,46,0.85)',borderVisible:false,wickUpColor:'#006064',wickDownColor:'rgba(46,46,46,0.85)'});
    return {chart,series};
  }

  async function fetchLast3(symbol,interval){
    const url=`https://api.bybit.com/v5/market/kline?category=linear&symbol=${symbol}&interval=${interval}&limit=3`;
    const res=await fetch(url); const json=await res.json(); const list=json?.result?.list||[];
    return list.map(k=>({time:Number(k[0])/1000,open:+k[1],high:+k[2],low:+k[3],close:+k[4]})).reverse();
  }
  function subscribeWS(symbol,interval,cb){
    const ws=new WebSocket(wsURL);
    ws.onopen=()=>ws.send(JSON.stringify({op:'subscribe',args:[`kline.${interval}.${symbol}`]}));
    ws.onmessage=ev=>{const msg=JSON.parse(ev.data); if(msg.data?.[0]) cb(msg.data[0]);};
    ws.onclose=()=>setTimeout(()=>subscribeWS(symbol,interval,cb),2000);
  }

  function nextClose(interval){
    const now=new Date();
    if(interval==='240'){const h=Math.floor(now.getUTCHours()/4)*4+4;const n=new Date(Date.UTC(now.getUTCFullYear(),now.getUTCMonth(),now.getUTCDate(),h,0,0)); if(n<=now) n.setUTCHours(n.getUTCHours()+4); return n;}
    return new Date(Date.UTC(now.getUTCFullYear(),now.getUTCMonth(),now.getUTCDate()+1,0,0,0));
  }
  function updateSettlement(){
    const now=new Date();
    const fmt=ms=>{const t=Math.floor(ms/1000),h=Math.floor(t/3600),m=Math.floor((t%3600)/60),s=t%60;return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;};
    settlementEl.textContent=`4H (${fmt(nextClose('240')-now)}) | 1D (${fmt(nextClose('D')-now)})`;
  }
  setInterval(updateSettlement,1000); updateSettlement();

  async function addSymbolRow(symbol){
    symbol=symbol.toUpperCase(); if(!/^[A-Z0-9]{6,20}$/.test(symbol)) return; if(document.getElementById(`row-${symbol}`)) return;
    const row=document.createElement('div'); row.className='row'; row.id=`row-${symbol}`;
    row.innerHTML=`<div class="row-head"><div class="symbol">${symbol}</div><button class="b2" data-remove="${symbol}">移除</button></div><div class="charts"><div class="chartbox"><div class="chartlabel">4H</div><div id="${symbol}-4h" class="chart"></div></div><div class="chartbox"><div class="chartlabel">1D</div><div id="${symbol}-1d" class="chart"></div></div></div>`;
    cards.appendChild(row);
    row.querySelector('[data-remove]').onclick=()=>row.remove();

    const c4=createChart(document.getElementById(`${symbol}-4h`));
    const c1=createChart(document.getElementById(`${symbol}-1d`));
    let d4=await fetchLast3(symbol,'240'); let d1=await fetchLast3(symbol,'D');
    c4.series.setData(d4); c1.series.setData(d1); c4.chart.timeScale().fitContent(); c1.chart.timeScale().fitContent();

    subscribeWS(symbol,'240',k=>{const c={time:k.start/1000,open:+k.open,high:+k.high,low:+k.low,close:+k.close}; if(d4.length&&d4[d4.length-1].time===c.time)d4[d4.length-1]=c; else d4.push(c); if(d4.length>3)d4.shift(); c4.series.setData(d4);});
    subscribeWS(symbol,'D',k=>{const c={time:k.start/1000,open:+k.open,high:+k.high,low:+k.low,close:+k.close}; if(d1.length&&d1[d1.length-1].time===c.time)d1[d1.length-1]=c; else d1.push(c); if(d1.length>3)d1.shift(); c1.series.setData(d1);});
  }

  document.getElementById('addBtn').onclick=()=>{const el=document.getElementById('symbolInput'); const sym=el.value.trim().toUpperCase(); if(sym) addSymbolRow(sym); el.value='';};
</script>
</body>
</html>
